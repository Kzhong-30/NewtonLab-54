version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: script-kill-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: script_kill
      POSTGRES_USER: script_kill
      POSTGRES_PASSWORD: script_kill_password
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U script_kill"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - script-kill-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: script-kill-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://script_kill:script_kill_password@postgres:5432/script_kill
      SECRET_KEY: script-kill-secret-key-for-docker-2024
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
      TZ: Asia/Shanghai
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: sh -c "python init_db.py && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    networks:
      - script-kill-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: script-kill-frontend
    restart: unless-stopped
    environment:
      - VITE_API_BASE_URL=http://localhost:8000/api
      - TZ=Asia/Shanghai
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 5173
    networks:
      - script-kill-network

volumes:
  postgres_data:
    driver: local

networks:
  script-kill-network:
    driver: bridge
